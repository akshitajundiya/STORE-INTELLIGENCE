<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Store Intelligence — Live</title>
<style>
:root{--bg:#0f1115;--card:#171a21;--ink:#e8eaed;--mut:#9aa0aa;--acc:#7c5cff;--ok:#39d98a;--warn:#ffcf5c;--crit:#ff6b6b}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto}
.wrap{max-width:1040px;margin:0 auto;padding:28px}
h1{font-size:20px;margin:0 0 2px}.sub{color:var(--mut);font-size:13px;margin-bottom:22px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.card{background:var(--card);border:1px solid #232734;border-radius:14px;padding:18px}
.k{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.v{font-size:30px;font-weight:650;margin-top:6px}
.row{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-top:14px}
.bar{height:26px;background:#11141b;border-radius:7px;overflow:hidden;margin:7px 0}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--acc),#56b0ff)}
.flabel{display:flex;justify-content:space-between;font-size:13px;color:var(--mut)}
.an{padding:9px 12px;border-radius:9px;margin:7px 0;font-size:13px;border-left:3px solid var(--mut);background:#11141b}
.INFO{border-color:#56b0ff}.WARN{border-color:var(--warn)}.CRITICAL{border-color:var(--crit)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ok);margin-right:7px;animation:p 1.4s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.z{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:13px}
.zbar{flex:1;height:9px;background:#11141b;border-radius:5px;overflow:hidden}.zbar>span{display:block;height:100%;background:var(--acc)}
</style></head><body><div class="wrap">
<h1><span class="dot"></span>Store Intelligence — STORE_BLR_002 · Brigade Road</h1>
<div class="sub">Live metrics, polling <code>/metrics</code> every 3s · North Star: Offline Conversion Rate</div>
<div class="grid">
  <div class="card"><div class="k">Conversion</div><div class="v" id="conv">—</div></div>
  <div class="card"><div class="k">Unique Visitors</div><div class="v" id="uv">—</div></div>
  <div class="card"><div class="k">Queue Depth</div><div class="v" id="q">—</div></div>
  <div class="card"><div class="k">Abandonment</div><div class="v" id="ab">—</div></div>
</div>
<div class="row">
  <div class="card"><div class="k">Funnel</div><div id="funnel"></div></div>
  <div class="card"><div class="k">Top Zones (heatmap)</div><div id="zones"></div></div>
</div>
<div class="card" style="margin-top:14px"><div class="k">Active Anomalies</div><div id="anoms"></div></div>
</div>
<script>
const API = location.origin.includes("file") ? "http://localhost:8000" : "";
const S = "STORE_BLR_002";
async function j(p){const r=await fetch(API+p);return r.json();}
async function tick(){
 try{
  const m=await j(`/stores/${S}/metrics`);
  conv.textContent=(m.conversion_rate*100).toFixed(1)+"%";
  uv.textContent=m.unique_visitors; q.textContent=m.current_queue_depth;
  ab.textContent=(m.abandonment_rate*100).toFixed(1)+"%";
  const f=await j(`/stores/${S}/funnel`);
  funnel.innerHTML=f.stages.map(s=>{const w=f.stages[0].visitors?100*s.visitors/f.stages[0].visitors:0;
    return `<div class="flabel"><span>${s.stage}</span><span>${s.visitors} · -${s.drop_off_pct}%</span></div><div class="bar"><span style="width:${w}%"></span></div>`}).join("");
  const h=await j(`/stores/${S}/heatmap`);const mx=h.cells[0]?h.cells[0].visit_frequency:1;
  zones.innerHTML=h.cells.slice(0,7).map(c=>`<div class="z"><span style="width:120px">${c.zone_id}</span><div class="zbar"><span style="width:${100*c.visit_frequency/mx}%"></span></div><span>${c.visit_frequency}</span></div>`).join("");
  const a=await j(`/stores/${S}/anomalies`);
  anoms.innerHTML=a.anomalies.length?a.anomalies.map(x=>`<div class="an ${x.severity}"><b>${x.type}</b> · ${x.severity}<br>${x.detail}<br><span style="color:var(--mut)">→ ${x.suggested_action}</span></div>`).join(""):'<div class="an">No active anomalies.</div>';
 }catch(e){anoms.innerHTML='<div class="an CRITICAL">API unreachable — start it on :8000</div>';}
}
tick();setInterval(tick,3000);
</script></body></html>
